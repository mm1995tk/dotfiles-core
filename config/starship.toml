# https://starship.rs/ja-JP/config/
"$schema" = 'https://starship.rs/config-schema.json'

format = """\
$time\
$username\
$hostname\
$localip\
$shlvl\
$singularity\
$kubernetes\
$directory\
$vcsh\
$fossil_branch\
$fossil_metrics\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$hg_branch\
$pijul_channel\
$docker_context\
$package\
$c\
$cmake\
$cobol\
$daml\
$dart\
$deno\
$dotnet\
$elixir\
$elm\
$erlang\
$fennel\
$golang\
$guix_shell\
$haskell\
$haxe\
$helm\
$java\
$julia\
$kotlin\
$gradle\
$lua\
$nim\
$nodejs\
$ocaml\
$opa\
$perl\
$php\
$pulumi\
$purescript\
$python\
$quarto\
$raku\
$rlang\
$red\
$ruby\
$rust\
$scala\
$solidity\
$swift\
$terraform\
$typst\
$vlang\
$vagrant\
$zig\
$buf\
$nix_shell\
$conda\
$meson\
$spack\
$memory_usage\
$aws\
$gcloud\
$openstack\
$azure\
$direnv\
$env_var\
$crystal\
$custom\
$sudo\
$cmd_duration\
$line_break\
$jobs\
$battery\
$status\
$os\
$container\
$shell\
$character\
"""

# palette = "github_dark"

[palettes.github_dark]
bg = "#101216"
fg = "#8B949E"
cursor = "#C9D1D9"
cursor_text = "#101216"
selection = "#3B5070"
link = "#58A6FF"

black = "#484f58"
red = "#ff7b72"
green = "#3fb950"
yellow = "#d29922"
blue = "#58a6ff"
magenta = "#bc8cff"
cyan = "#39c5cf"
white = "#b1bac4"

bright_black = "#6e7681"
bright_red = "#ffa198"
bright_green = "#56d364"
bright_yellow = "#e3b341"
bright_blue = "#79c0ff"
bright_magenta = "#d2a8ff"
bright_cyan = "#56d4dd"
bright_white = "#f0f6fc"

[status]
disabled = false

[time]
format = "[$time]($style)\n"
disabled = false
time_format = "%FT%T%:z"

[directory]
style = "bold blue"

[git_commit]
only_detached = false
