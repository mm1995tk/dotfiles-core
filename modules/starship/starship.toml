# https://starship.rs/ja-JP/config/
"$schema" = 'https://starship.rs/config-schema.json'

format = """\
$time\
$line_break\
$username\
$hostname\
$localip\
$shlvl\
$singularity\
$kubernetes\
$directory\
$vcsh\
$fossil_branch\
$fossil_metrics\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$hg_branch\
$pijul_channel\
$docker_context\
$package\
$c\
$cmake\
$cobol\
$daml\
$dart\
$deno\
$dotnet\
$elixir\
$elm\
$erlang\
$fennel\
$golang\
$guix_shell\
$haskell\
$haxe\
$helm\
$java\
$julia\
$kotlin\
$gradle\
$lua\
$nim\
$nodejs\
$ocaml\
$opa\
$perl\
$php\
$pulumi\
$purescript\
$python\
$quarto\
$raku\
$rlang\
$red\
$ruby\
$rust\
$scala\
$solidity\
$swift\
$terraform\
$typst\
$vlang\
$vagrant\
$zig\
$buf\
$nix_shell\
$conda\
$meson\
$spack\
$memory_usage\
$aws\
$gcloud\
$openstack\
$azure\
$direnv\
$env_var\
$crystal\
$custom\
$sudo\
$cmd_duration\
$line_break\
$jobs\
$battery\
$status\
$os\
$container\
$shell\
$character\
"""

palette = "github_dark"

# wezterm 組み込みの "GitHub Dark" スキーム（iTerm2-Color-Schemes 由来）と同一の値。
# 色名を上書きすることで、ターミナル側のテーマに依存せず同じ見た目になる。
[palettes.github_dark]
bg = "#101216"
fg = "#8b949e"
cursor = "#c9d1d9"
cursor_text = "#101216"
selection = "#3b5070"

black = "#000000"
red = "#f78166"
green = "#56d364"
yellow = "#e3b341"
blue = "#6ca4f8"
# starship の組み込み色名は "purple"。"magenta" も同値で定義しておく。
purple = "#db61a2"
magenta = "#db61a2"
cyan = "#2b7489"
white = "#ffffff"

bright-black = "#4d4d4d"
bright-red = "#f78166"
bright-green = "#56d364"
bright-yellow = "#e3b341"
bright-blue = "#6ca4f8"
bright-purple = "#db61a2"
bright-magenta = "#db61a2"
bright-cyan = "#2b7489"
bright-white = "#ffffff"

[status]
disabled = false

[time]
format = "[$time]($style)"
disabled = false
time_format = "%FT%T%:z"

[directory]
style = "bold blue"

[git_commit]
only_detached = false
